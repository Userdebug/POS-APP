database_file: database/app.db

# === ARCHITECTURE PATTERNS ===
patterns:
  passive_view:
    controller: controllers/main_controller.py
    view: main_window.py
  mvvm:
    viewmodels: viewmodels/
  repository:
    data_access: repositories/

# === CRITICAL IMPORTS ===
critical_imports:
  database: "from core.database import DatabaseManager"
  settings: "from core.settings import SettingsService, get_parameter, set_parameter"
  constants: "from core.constants import *"

# === DATE HANDLING ===
date_helpers:
  location: "core/database/_manager.py:122"
  functions:
    - _day_bounds
    - _month_bounds
  formats:
    - "%d/%m/%y"
    - "%Y-%m-%d"

# === DATABASE RULES ===
database:
  root: database/app.db
  wal_files: "-wal, -shm sidecars must be copied with .db"
  access: "Always use DatabaseManager, never raw sqlite3.connect"
  parameters: "Use get_parameter() / set_parameter() - auto-upgrades legacy"