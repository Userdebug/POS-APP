# CI/CD Pipeline for Gestion Caisses
# Runs on push and pull requests to main branch and all branches

name: CI

on:
  push:
    branches: [main, develop, "**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  QT_QPA_PLATFORM: offscreen

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black flake8

      - name: Run ruff
        run: python -m ruff check .

      - name: Run black
        run: python -m black --check .

      - name: Run flake8
        run: python -m flake8 .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pytest pytest-cov

      - name: Run pytest
        run: pytest --verbose --cov=. --cov-report=xml --cov-report=term tests/

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

