errors:
  # === FILE SYSTEM ISSUES ===
  - id: duplicate_file_issue
    pattern: modifications not taken into account
    cause: duplicated file in the project
    detection:
      - check for similar filenames
      - compare file contents
    solution:
      - delete the duplicate file
      - update imports to point to the active file