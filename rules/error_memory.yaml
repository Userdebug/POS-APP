# Error Memory - Common issues and their resolution patterns
# Helps agents quickly identify and fix recurring problems
# UPDATE when new bugs are discovered or new edge cases found

version: "1.0"
last_updated: "2026-04-22"

errors:
  # === UI/STYLE ISSUES ===
  - id: search_lag_on_clear
    pattern: lenteur lors de l'effacement de la recherche / lag en tapant
    cause: |
      - `_filtered_produits()` appelée plusieurs fois par cycle de refresh
      - Rebuild des boutons catégorie à chaque keystroke
      - Pas de cache pour les produits filtrés
    detection:
      - Comparer `_on_search_changed` entre `products_table.py` et `zone_produits/products_widget.py`
      - Ajouter logging pour compter les appels à `_filtered_produits`
    solution:
      - Ajouter `_filtered_cache` pour éviter le recalcul
      - Skip `_build_category_buttons` quand catégorie inchangée
      - `_set_category` early return si catégorie identique
      - `_on_search_changed` appelle `_incremental_update` directement (pas via `refresh`)
      - Invalider cache dans `set_produits`, `update_produit`, `_set_category`
    prevention:
      - Utiliser `_get_filtered_produits()` pour les appels multiples
      - Skip rebuild UI si données n'ont pas changé

  # === FILE SYSTEM ISSUES ===
  - id: duplicate_file_issue
    pattern: modifications non prises en compte
    cause: fichier dupliqué dans le projet
    detection:
      - vérifier fichiers similaires (mêmes noms ou noms proches)
      - comparer le contenu des fichiers
      - vérifier les imports qui pointent vers le mauvais fichier
    solution:
      - supprimer le fichier doublon
      - garder le fichier actif et mettre à jour les imports
    prevention:
      - vérifier unicité des fichiers avant modification
      - utiliser des noms de fichiers descriptifs et uniques

  # === IMPORT ISSUES ===
  - id: import_path_not_on_sys.path
    pattern: ModuleNotFoundError / cannot import name
    cause: projet non ajouté au sys.path
    detection:
      - vérifier si projet root est dans sys.path
      - vérifier si l'import utilise le bon préfixe
    solution:
      - utiliser _ensure_project_on_path() comme dans main.py:12
      - exécuter pip install -e .
    prevention:
      - ne jamais utiliser d'imports absolus vers le projet
      - toujours ajouter le projet au path

  # === DATABASE ISSUES ===
  - id: sqlite_wal_lock
    pattern: database is locked / SQLite busy error
    cause: accès concurrent au fichier DB sans attente WAL
    detection:
      - vérifier si WAL/SHM files sont présents
      - vérifier connexions non fermées
    solution:
      - utiliser DatabaseManager context managers (_manager.py:116)
      - permettre au WAL de flush (attendre checkpoint)
    prevention:
      - toujours utiliser "with DatabaseManager" pour les accès fichiers
      - ne jamais utiliser sqlite3.connect directement

  - id: database_file_not_found
    pattern: Unable to find database file
    cause: chemin vers app.db incorrect ou fichier manquant
    detection:
      - vérifier le chemin dans DatabaseManager
      - vérifier que app.db existe
    solution:
      - vérifier le chemin de la base de données
      - exécuter init_db.py si nécessaire
    prevention:
      - toujours utiliser les chemins absolus ou Path()

  # === DATE FORMAT ISSUES ===
  - id: date_format_mismatch
    pattern: résultats de requête vides ou incorrects
    cause: format de date incompatible (%d/%m/%y vs %Y-%m-%d)
    detection:
      - vérifier format des dates dans les queries
      - tester avec les deux formats
    solution:
      - utiliser _day_bounds / _month_bounds de _manager.py:122
      -统一的日期处理函数
    prevention:
      - ne pas hardcoder de formats de date
      - réutiliser les fonctions utilitaires

  # === SETTINGS/PARAMETERS ISSUES ===
  - id: settings_parameter_not_found
    pattern: paramètre non trouvé / valeur par défaut utilisée
    cause: paramètre pas encore migré ou mal orthographié
    detection:
      - vérifier settings/ et table parametres
      - tester get_parameter()
      - vérifier le nom du paramètre
    solution:
      - exécuter migrate_legacy_parameters()
      - utiliser set_parameter pour créer le paramètre
    prevention:
      - toujours utiliser get_parameter/set_parameter
      - ne pas accéder directement à la table parametres

  # === QT/UI ISSUES ===
  - id: qt_widget_not_shown
    pattern: fenêtre non visible / écran noir
    cause: QT_QPA_PLATFORM non configuré en headless
    detection:
      - vérifier si DISPLAY/WAYLAND_DISPLAY défini
      - vérifier si CODEX_CI est défini
    solution:
      - ajouter os.environ["QT_QPA_PLATFORM"] = "offscreen"
      - appeler _configure_headless_qt_if_needed() de main.py:17
    prevention:
      - toujours appeler _configure_headless_qt_if_needed() au démarrage

  - id: qt_import_error
    pattern: No module named 'PyQt6'
    cause: PyQt6 non installé ou venv non activé
    detection:
      - vérifier si venv est activé
      - vérifier installation de PyQt6
    solution:
      - activer le virtual environment
      - installer pip install PyQt6
    prevention:
      - toujours utiliser le bon venv

  # === TRANSACTION ISSUES ===
  - id: transaction_not_committed
    pattern: données non persistées après opération
    cause: connexion fermée sans commit
    detection:
      - vérifier les transactions non commitées
      - tester après redémarrage de l'app
    solution:
      - toujours appeler commit() après transactions
      - utiliser les context managers
    prevention:
      - préférer les méthodes DatabaseManager qui auto-commit

  # === CONSTANTS ISSUES ===
  - id: constants_not_exported
    pattern: NameError: name XXX is not defined
    cause: constante non dans __all__ ou pas importée
    detection:
      - vérifier core/constants.py
      - vérifier si la constante existe
    solution:
      - ajouter la constante à __all__ dans constants.py
      - vérifier l'import: from core.constants import *
    prevention:
      - toutes les constantes doivent être dans __all__

  # === EXCEPTION ISSUES ===
  - id: custom_exception_not_found
    pattern: NameError ou exception non trouvée
    cause: exception personnalisée pas définie ou pas importée
    detection:
      - vérifier core/exceptions.py
      - vérifier l'héritage de POSException
    solution:
      - créer l'exception dans core/exceptions.py
      - hériter de POSException
    prevention:
      - toutes les exceptions custom doivent hériter de POSException

  # === TEST ISSUES ===
  - id: test_db_interference
    pattern: test échoue à cause de données existantes
    cause: base de données non isolée pour les tests
    detection:
      - vérifier si les tests utilisent une DB séparée
      - vérifier le fixture de base de données
    solution:
      - utiliser une base de données en mémoire pour les tests
      - nettoyer la DB entre les tests
    prevention:
      - toujours isoler les tests avec une DB séparée

  # === SCHEMA ISSUES ===
  - id: schema_column_missing
    pattern: no such column: XXX
    cause: colonne non existante dans la table
    detection:
      - vérifier schema.sql
      - vérifier la définition de la table
    solution:
      - ajouter la colonne au schéma
      - créer une migration
    prevention:
      - vérifier schema.sql avant d'ajouter des colonnes